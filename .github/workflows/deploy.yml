name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CONTAINER_NAME: sinergidesa-admin
  NGINX_PROXY_NETWORK: nginx-proxy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Podman server
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          NGINX_PROXY_NETWORK: ${{ env.NGINX_PROXY_NETWORK }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          VIRTUAL_HOST: ${{ secrets.VIRTUAL_HOST }}
          LETSENCRYPT_HOST: ${{ secrets.LETSENCRYPT_HOST }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: REGISTRY,IMAGE_NAME,CONTAINER_NAME,NGINX_PROXY_NETWORK,IMAGE_TAG,GHCR_TOKEN,GITHUB_ACTOR,VIRTUAL_HOST,LETSENCRYPT_HOST,LETSENCRYPT_EMAIL
          script: |
            set -euo pipefail

            echo "$GHCR_TOKEN" | podman login "$REGISTRY" -u "$GITHUB_ACTOR" --password-stdin

            IMAGE="$REGISTRY/$IMAGE_NAME:$IMAGE_TAG"

            podman pull "$IMAGE"

            podman stop "$CONTAINER_NAME" 2>/dev/null || true
            podman rm "$CONTAINER_NAME" 2>/dev/null || true

            RUN_ARGS=(
              --name "$CONTAINER_NAME"
              --network "$NGINX_PROXY_NETWORK"
              --restart unless-stopped
              -e "VIRTUAL_HOST=$VIRTUAL_HOST"
              -e "VIRTUAL_PORT=80"
            )

            if [ -n "${LETSENCRYPT_HOST:-}" ]; then
              RUN_ARGS+=(-e "LETSENCRYPT_HOST=$LETSENCRYPT_HOST")
            fi

            if [ -n "${LETSENCRYPT_EMAIL:-}" ]; then
              RUN_ARGS+=(-e "LETSENCRYPT_EMAIL=$LETSENCRYPT_EMAIL")
            fi

            podman run -d "${RUN_ARGS[@]}" "$IMAGE"

            podman image prune -f
